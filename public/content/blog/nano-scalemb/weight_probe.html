    "#e6e9ef":"#181825","#dce0e8":"#11111b"
  };
  var gd, orig;
  function isDark(){ try{ return window.parent.document.documentElement.classList.contains("dark"); }catch(e){ return false; } }
  function swap(s){ return MAP[s.toLowerCase()]||s; }
  function walk(n){
    if(Array.isArray(n)){ for(var i=0;i<n.length;i++){ if(typeof n[i]==="string") n[i]=swap(n[i]); else walk(n[i]); } }
    else if(n&&typeof n==="object"){ for(var k in n){ if(typeof n[k]==="string") n[k]=swap(n[k]); else walk(n[k]); } }
  }
  function clone(o){ return JSON.parse(JSON.stringify(o)); }
  function fit(){ if(gd&&window.Plotly) Plotly.relayout(gd,{width:window.innerWidth,height:window.innerHeight,autosize:true}); }
  function applyTheme(){
    if(!gd||!window.Plotly||!orig) return;
    var d=clone(orig.data), l=clone(orig.layout);
    delete l.width; delete l.height;
    if(isDark()){ walk(d); walk(l); }
    Plotly.react(gd,d,l).then(fit);
  }
  function init(){
    gd=document.querySelector(".plotly-graph-div");
    if(!gd||!window.Plotly){ return setTimeout(init,50); }
    orig={data:clone(gd.data), layout:clone(gd.layout)};
    applyTheme();
    window.addEventListener("resize", fit);
    try{
      new MutationObserver(applyTheme).observe(
        window.parent.document.documentElement,
        {attributes:true, attributeFilter:["class"]}
      );
    }catch(e){}
  }
  if(document.readyState==="complete") init();
  else window.addEventListener("load", init);
})();
