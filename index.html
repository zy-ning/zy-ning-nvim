    <style>
      * {
        font-family: "Fira Code", "Maple Mono NF CN", "Maple Mono", monospace;
      }

      html {
        scroll-behavior: smooth;
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .animate-fade-in {
        animation: fadeInUp 0.4s ease-out forwards;
      }

      .animate-slide-in {
        animation: slideInLeft 0.3s ease-out forwards;
      }

      .glass-effect {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .hover-lift {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .hover-lift:hover {
        transform: translateY(-1px);
      }

      :root {
        --ctp-rosewater: #dc8a78;
        --ctp-flamingo: #dd7878;
        --ctp-pink: #ea76cb;
        --ctp-mauve: #8839ef;
        --ctp-red: #d20f39;
        --ctp-maroon: #e64553;
        --ctp-peach: #fe640b;
        --ctp-yellow: #df8e1d;
        --ctp-green: #40a02b;
        --ctp-teal: #179299;
        --ctp-sky: #04a5e5;
        --ctp-sapphire: #209fb5;
        --ctp-blue: #1e66f5;
        --ctp-lavender: #7287fd;
        --ctp-pure: #000000;
        --ctp-text: #4c4f69;
        --ctp-subtext1: #5c5f77;
        --ctp-subtext0: #6c6f85;
        --ctp-overlay2: #7c7f93;
        --ctp-overlay1: #8c8fa1;
        --ctp-overlay0: #9ca0b0;
        --ctp-surface2: #acb0be;
        --ctp-surface1: #bcc0cc;
        --ctp-surface0: #ccd0da;
        --ctp-base: #eff1f5;
        --ctp-mantle: #e6e9ef;
        --ctp-crust: #dce0e8;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-glow: 0 0 20px rgba(136, 57, 239, 0.15);
      }
      html.dark {
        --ctp-rosewater: #f5e0dc;
        --ctp-flamingo: #f2cdcd;
        --ctp-pink: #f5c2e7;
        --ctp-mauve: #cba6f7;
        --ctp-red: #f38ba8;
        --ctp-maroon: #eba0ac;
        --ctp-peach: #fab387;
        --ctp-yellow: #f9e2af;
        --ctp-green: #a6e3a1;
        --ctp-teal: #94e2d5;
        --ctp-sky: #89dceb;
        --ctp-sapphire: #74c7ec;
        --ctp-blue: #89b4fa;
        --ctp-lavender: #b4befe;
        --ctp-pure: #ffffff;
        --ctp-text: #cdd6f4;
        --ctp-subtext1: #bac2de;
        --ctp-subtext0: #a6adc8;
        --ctp-overlay2: #9399b2;
        --ctp-overlay1: #7f849c;
        --ctp-overlay0: #6c7086;
        --ctp-surface2: #585b70;
        --ctp-surface1: #45475a;
        --ctp-surface0: #313244;
        --ctp-base: #1e1e2e;
        --ctp-mantle: #181825;

        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        --shadow-glow: 0 0 25px rgba(203, 166, 247, 0.2);
      }

      ::selection {
        background-color: var(--ctp-lavender);
        color: var(--ctp-base);
